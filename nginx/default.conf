server {
    listen 80;
    # Optimización para cookies grandes (JWT)
    proxy_buffer_size   128k;
    proxy_buffers       4 256k;
    proxy_busy_buffers_size 256k;

    # Frontend
    location / {
        proxy_pass http://frontend:80; # Apunta al Nginx del contenedor frontend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API y WebSockets
    # Socket.io usa por defecto la ruta /socket.io
    location /socket.io/ {
        proxy_pass http://backend:3000; # Puerto de NestJS
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend
    location /api {
        proxy_pass http://backend:3000; # Apunta al proceso Node del backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}